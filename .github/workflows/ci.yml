name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1
      - name: Build client-wasm
        run: wasm-pack build client-wasm --target bundler
      # The frontend (tsc/vite) imports client-wasm/pkg, which is a gitignored build
      # output — hand it to the frontend job instead of rebuilding Rust there.
      - name: Upload client-wasm pkg
        uses: actions/upload-artifact@v4
        with:
          name: client-wasm-pkg
          path: client-wasm/pkg
          retention-days: 1

  frontend:
    name: Frontend (tsc, eslint, vitest, build)
    needs: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # Restore the wasm package built by the rust job (path is repo-root relative).
      - name: Restore client-wasm pkg
        uses: actions/download-artifact@v4
        with:
          name: client-wasm-pkg
          path: client-wasm/pkg
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint .
      - name: Test
        run: npx vitest run
      - name: Build
        run: npx vite build
